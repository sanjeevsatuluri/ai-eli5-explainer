<head>
  <title>ELI5 Explainer</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #result {
      margin-top: 15px;
      text-align: left;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Explain Like I'm 5</h2>

  <input type="text" id="topic" placeholder="Enter a topic..." />

  <button onclick="explain()" id="btn">Explain</button>

  <div id="result"></div>
</div>

async function explain() {
  const topic = document.getElementById("topic").value;
  const resultDiv = document.getElementById("result");
  const btn = document.getElementById("btn");

  if (!topic) {
    resultDiv.innerText = "Please enter a topic.";
    return;
  }

  btn.innerText = "Loading...";
  btn.disabled = true;

  const apiKey = "AIzaSyBbaU17X9ABiXk7jSjdoL53OPlKVvUSbFY";

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: "Explain " + topic + " like I am 5 years old"
            }]
          }]
        })
      }
    );

    const data = await response.json();

    // 🔥 SAFE CHECK
    if (data.candidates && data.candidates.length > 0) {
      resultDiv.innerText = data.candidates[0].content.parts[0].text;
    } else if (data.error) {
      resultDiv.innerText = "API Error: " + data.error.message;
      console.log(data.error);
    } else {
      resultDiv.innerText = "No response from AI.";
      console.log(data);
    }

  } catch (error) {
    resultDiv.innerText = "Error: " + error.message;
  }

  btn.innerText = "Explain";
  btn.disabled = false;
}
</script>
